    {type:'value',name:'成交量(万手)',position:'left'},
    {type:'value',name:'成交额(万)',position:'right'}
  ],
  dataZoom:[{type:'inside',start:70,end:100},{type:'slider',start:70,end:100}],
  series:[
    {name:'成交量',type:'bar',yAxisIndex:0,data:vdata.map(function(v){return{value:v[1]/10000,itemStyle:{color:v[2]>0?'#e74c3c':'#27ae60'}}})},
    {name:'成交额',type:'line',yAxisIndex:1,data:amts,smooth:true,lineStyle:{width:1,color:'#f39c12'},symbol:'none'}
  ]
});
window.addEventListener('resize',function(){chartK.resize();chartV.resize();});
</script>
</body>
</html>
