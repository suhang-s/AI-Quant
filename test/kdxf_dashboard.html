// 计算统计数据
const latest = rawData[rawData.length - 1];
const first = rawData[0];
const periodChange = ((latest.close - first.close) / first.close * 100).toFixed(2);
const maxClose = Math.max(...rawData.map(d => d.close));
const minClose = Math.min(...rawData.map(d => d.close));
const avgVol = (rawData.reduce((s,d) => s + d.vol, 0) / rawData.length / 10000).toFixed(2);
const totalAmount = (rawData.reduce((s,d) => s + d.amount, 0) / 100000000).toFixed(2);

const chgClass = periodChange >= 0 ? 'up' : 'down';
const chgSign = periodChange >= 0 ? '+' : '';

const statsHtml = `
  <div class="stat-card"><div class="label">最新收盘价</div><div class="value">¥${latest.close.toFixed(2)}</div></div>
  <div class="stat-card ${chgClass}"><div class="label">区间涨跌幅</div><div class="value">${chgSign}${periodChange}%</div></div>
  <div class="stat-card"><div class="label">区间最高价</div><div class="value">¥${maxClose.toFixed(2)}</div></div>
  <div class="stat-card"><div class="label">区间最低价</div><div class="value">¥${minClose.toFixed(2)}</div></div>
  <div class="stat-card"><div class="label">日均成交量</div><div class="value">${avgVol} 万手</div></div>
  <div class="stat-card"><div class="label">区间总成交额</div><div class="value">¥${totalAmount} 亿</div></div>
  <div class="stat-card"><div class="label">数据天数</div><div class="value">${rawData.length} 日</div></div>
  <div class="stat-card"><div class="label">数据起止</div><div class="value" style="font-size:14px;">${first.date} ~ ${latest.date}</div></div>
`;
document.getElementById('statsBox').innerHTML = statsHtml;

// K线图
const klineChart = echarts.init(document.getElementById('klineChart'));
const dates = rawData.map(d => d.date);
const ohlc = rawData.map(d => [d.open, d.close, d.low, d.high]);
const closeLine = rawData.map(d => d.close);

// MA 均线
function calcMA(period) {
  const result = [];
  for (let i = 0; i < rawData.length; i++) {
    if (i < period - 1) { result.push(null); continue; }
    let sum = 0;
    for (let j = 0; j < period; j++) sum += rawData[i - j].close;
    result.push((sum / period).toFixed(2));
  }
  return result;
}

klineChart.setOption({
  tooltip: {
    trigger: 'axis',
    axisPointer: { type: 'cross' }
  },
  legend: { data: ['日K', 'MA5', 'MA20', 'MA60'], top: 0 },
  grid: { left: '6%', right: '4%', top: 40, bottom: 80 },
  xAxis: {
    type: 'category',
    data: dates,
    boundaryGap: true,
    axisLine: { onZero: false },
    splitLine: { show: false },
    axisLabel: { rotate: 0 }
  },
  yAxis: {
    scale: true,
    splitArea: { show: true }
  },
  dataZoom: [
    { type: 'inside', start: 60, end: 100 },
    { show: true, type: 'slider', top: '90%', start: 60, end: 100 }
  ],
  series: [
    {
      name: '日K',
      type: 'candlestick',
      data: ohlc,
      itemStyle: {
        color: '#e74c3c',        // 涨-红
        color0: '#27ae60',       // 跌-绿
        borderColor: '#e74c3c',
        borderColor0: '#27ae60'
      }
    },
    { name: 'MA5', type: 'line', data: calcMA(5), smooth: true,
      lineStyle: { width: 1 }, showSymbol: false },
    { name: 'MA20', type: 'line', data: calcMA(20), smooth: true,
      lineStyle: { width: 1 }, showSymbol: false },
    { name: 'MA60', type: 'line', data: calcMA(60), smooth: true,
      lineStyle: { width: 1 }, showSymbol: false }
  ]
});

// 交易量图
const volChart = echarts.init(document.getElementById('volChart'));
const vols = rawData.map(d => (d.vol / 10000).toFixed(2));
const amounts = rawData.map(d => (d.amount / 100000000).toFixed(4));
const volColors = rawData.map(d => d.close >= d.open ? '#e74c3c' : '#27ae60');

volChart.setOption({
  tooltip: {
    trigger: 'axis',
    axisPointer: { type: 'cross' },
    formatter: function(params) {
      const i = params[0].dataIndex;
      const d = rawData[i];
      return `${d.date}<br/>
        成交量: ${(d.vol/10000).toFixed(2)} 万手<br/>
        成交额: ¥${(d.amount/100000000).toFixed(4)} 亿<br/>
        涨跌幅: ${d.pct_chg.toFixed(2)}%`;
    }
  },
  legend: { data: ['成交量(万手)', '成交额(亿元)'], top: 0 },
  grid: { left: '6%', right: '6%', top: 40, bottom: 80 },
  xAxis: {
    type: 'category',
    data: dates,
    axisLabel: { rotate: 0 }
  },
  yAxis: [
    { name: '成交量(万手)', position: 'left',
      axisLabel: { formatter: '{value}' } },
    { name: '成交额(亿元)', position: 'right',
      axisLabel: { formatter: '{value}' } }
  ],
  dataZoom: [
    { type: 'inside', start: 60, end: 100 },

  ],
  series: [
    {
      name: '成交量(万手)',

      showSymbol: false,
      lineStyle: { color: '#1e88e5', width: 2 },
      areaStyle: { color: 'rgba(30,136,229,0.1)' }
